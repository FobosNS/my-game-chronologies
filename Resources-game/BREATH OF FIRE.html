<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breath of Fire — Архивы Драконов</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --bg-dark: #1a0a0a;
      --bg-gradient: linear-gradient(135deg, #1a0a0a, #2a121a);
      --card-bg: rgba(30, 15, 25, 0.95);
      --text-light: #f0e0d0;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      color: var(--text-light);
      margin: 0;
      padding: clamp(10px, 5vw, 40px);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      color: var(--gold);
      font-size: clamp(1.5rem, 6vw, 2.5rem);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 15px var(--gold-glow);
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #88ccff;
      font-style: italic;
      margin-bottom: 2rem;
      opacity: 0.8;
    }

    /* Filters Section */
    .filters {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .filter-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--gold);
      border: 1px solid var(--gold);
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 700;
      transition: var(--transition);
      outline: none;
    }

    .filter-btn:hover {
      background: rgba(212, 175, 55, 0.1);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    .filter-btn.active {
      background: var(--gold);
      color: var(--bg-dark);
      box-shadow: 0 0 20px var(--gold-glow);
    }

    /* Table System */
    .table-wrapper {
      background: var(--card-bg);
      border: 1px solid #4a3020;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }

    .scroll-hint {
      display: none;
      text-align: center;
      font-size: 0.7rem;
      color: var(--gold);
      margin-bottom: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(0, 0, 0, 0.3);
      color: var(--gold);
      text-align: left;
      padding: 16px;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid #3a2518;
    }

    td {
      padding: 14px 16px;
      border-bottom: 1px solid #3a2518;
      transition: var(--transition);
    }

    tr:last-child td { border-bottom: none; }
    
    tr:hover td {
      background: rgba(212, 175, 55, 0.05);
    }

    .type-badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      margin-left: 8px;
    }

    @media (max-width: 768px) {
      .table-wrapper { overflow-x: auto; }
      .scroll-hint { display: block; }
      table { min-width: 700px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>🐉 Breath of Fire Archives</h1>
      <div class="subtitle">«Хронология Драконьих Судеб: Наследие Клана Света»</div>
    </header>

    <nav class="filters" id="filterContainer">
      <button class="filter-btn active" data-filter="all">Все записи</button>
      <button class="filter-btn" data-filter="main">Канон</button>
      <button class="filter-btn" data-filter="remaster">Издания</button>
      <button class="filter-btn" data-filter="spinoff">Архивы</button>
    </nav>

    <div class="scroll-hint">↔ Листайте таблицу вправо</div>
    <div class="table-wrapper">
      <table id="gamesTable">
        <thead>
          <tr>
            <th>Эра</th>
            <th>Проект</th>
            <th>Системы</th>
            <th>Протагонист</th>
            <th>Суть</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          </tbody>
      </table>
    </div>
  </div>

  <script>
    /**
     * @typedef {Object} GameEntry
     * @property {string} year
     * @property {string} title
     * @property {string} platforms
     * @property {string} hero
     * @property {string} theme
     * @property {string} type
     */

    const DATABASE = [
      { year: "1993", title: "Breath of Fire", platforms: "SNES, GBA", hero: "Рю", theme: "Фэнтези, империя Десток", type: "main" },
      { year: "1994", title: "Breath of Fire II", platforms: "SNES, GBA", hero: "Рю", theme: "Вера vs. Истина", type: "main" },
      { year: "1997", title: "Breath of Fire III", platforms: "PS1, PSP", hero: "Рю (Клан Света)", theme: "Генезис и Дружба", type: "main" },
      { year: "2000", title: "Breath of Fire IV", platforms: "PS1, PC", hero: "Рю / Фу-Лу", theme: "Двойственность богов", type: "main" },
      { year: "2003", title: "Dragon Quarter", platforms: "PS2", hero: "Рю (1/8192)", theme: "Антиутопия, Выживание", type: "main" },
      { year: "2021", title: "Fan Remasters", platforms: "PC", hero: "—", theme: "Техническое обновление", type: "remaster" },
      { year: "1994", title: "Official Guide", platforms: "Book", hero: "—", theme: "Мифология мира", type: "spinoff" }
    ];

    class TableManager {
      constructor(data) {
        this.data = data;
        this.tbody = document.getElementById('tableBody');
        this.filterContainer = document.getElementById('filterContainer');
        this.activeFilter = 'all';

        this.init();
      }

      init() {
        this.render();
        // Используем делегирование событий вместо навешивания обработчика на каждую кнопку
        this.filterContainer.addEventListener('click', (e) => {
          const btn = e.target.closest('.filter-btn');
          if (!btn) return;
          
          this.setFilter(btn);
        });
      }

      setFilter(targetBtn) {
        // Оптимизация: не перерисовывать, если фильтр не изменился
        const newFilter = targetBtn.dataset.filter;
        if (this.activeFilter === newFilter) return;

        // UI Update
        this.filterContainer.querySelector('.active').classList.remove('active');
        targetBtn.classList.add('active');
        
        this.activeFilter = newFilter;
        this.render();
      }

      render() {
        const filtered = this.activeFilter === 'all' 
          ? this.data 
          : this.data.filter(item => item.type === this.activeFilter);

        // Использование фрагмента или join для минимизации перерисовок (Reflow)
        this.tbody.innerHTML = filtered.map(game => `
          <tr>
            <td><strong>${game.year}</strong></td>
            <td><strong>${game.title}</strong></td>
            <td><small>${game.platforms}</small></td>
            <td>${game.hero}</td>
            <td>${game.theme}</td>
          </tr>
        `).join('');
      }
    }

    // Запуск приложения
    new TableManager(DATABASE);
  </script>
</body>
</html>
