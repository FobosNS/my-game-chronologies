<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bat-Computer: Radar System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap');

    :root {
      --bat-green: #33ff66;
      --bat-green-dim: rgba(51, 255, 102, 0.15);
      --radar-bg: rgba(10, 15, 20, 0.9);
      --joker-pink: #ff33cc;
    }

    body {
      background: #05070a;
      color: var(--bat-green);
      font-family: 'Share Tech Mono', monospace;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* РАДАРНАЯ ПАНЕЛЬ */
    .radar-container {
      position: relative;
      width: 300px;
      height: 300px;
      background: var(--radar-bg);
      border: 2px solid var(--bat-green);
      border-radius: 50%;
      margin-bottom: 30px;
      box-shadow: 0 0 30px var(--bat-green-dim);
      overflow: hidden;
    }

    /* Луч сканера */
    .radar-beam {
      position: absolute;
      width: 100%;
      height: 100%;
      background: conic-gradient(from 0deg, var(--bat-green-dim) 0%, transparent 40%);
      animation: rotate 4s linear infinite;
    }

    /* Сетка радара */
    .radar-grid {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-image: 
        radial-gradient(circle, transparent 30%, var(--bat-green-dim) 31%, transparent 32%, var(--bat-green-dim) 60%, transparent 61%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .radar-axis {
      position: absolute;
      width: 100%;
      height: 1px;
      background: var(--bat-green-dim);
    }
    .radar-axis.v { transform: rotate(90deg); }

    /* Точки интереса (POI) */
    .poi {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--bat-green);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      filter: blur(1px);
      box-shadow: 0 0 10px var(--bat-green);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }

    .poi.active {
      opacity: 1;
      animation: ping 1.5s ease-out infinite;
    }

    /* СПИСОК ИГР */
    .game-list {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .game-card {
      background: rgba(20, 30, 40, 0.8);
      border: 1px solid var(--bat-green-dim);
      padding: 15px;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.2s;
    }

    .game-card:hover {
      border-color: var(--bat-green);
      background: rgba(51, 255, 102, 0.05);
      transform: scale(1.02);
    }

    .game-card h3 {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
    }

    /* АНИМАЦИИ */
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes ping {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
    }
  </style>
</head>
<body>

  <h1 style="font-family: 'Orbitron'; letter-spacing: 5px;">GOTHAM RADAR v4.0</h1>

  

  <div class="radar-container" id="radar">
    <div class="radar-beam"></div>
    <div class="radar-grid">
      <div class="radar-axis"></div>
      <div class="radar-axis v"></div>
    </div>
    </div>

  <div class="game-list">
    <div class="game-card" data-x="40" data-y="30">
      <h3>ARKHAM ORIGINS</h3>
      <small>LOCKED: Royal Hotel / Blackgate</small>
    </div>
    <div class="game-card" data-x="70" data-y="60">
      <h3>ARKHAM ASYLUM</h3>
      <small>LOCKED: Arkham Island</small>
    </div>
    <div class="game-card" data-x="30" data-y="80">
      <h3>ARKHAM CITY</h3>
      <small>LOCKED: Old Gotham / Bowery</small>
    </div>
    <div class="game-card" data-x="60" data-y="20">
      <h3>ARKHAM KNIGHT</h3>
      <small>LOCKED: Miagani Island</small>
    </div>
  </div>

  <script>
    const radar = document.getElementById('radar');
    const cards = document.querySelectorAll('.game-card');
    
    // Создаем POI для каждой карточки
    const pois = Array.from(cards).map((card, index) => {
      const poi = document.createElement('div');
      poi.className = 'poi';
      // Переводим проценты в координаты
      poi.style.left = card.dataset.x + '%';
      poi.style.top = card.dataset.y + '%';
      radar.appendChild(poi);
      
      // События наведения
      card.addEventListener('mouseenter', () => poi.classList.add('active'));
      card.addEventListener('mouseleave', () => poi.classList.remove('active'));
      
      return poi;
    });
  </script>
</body>
</html>
